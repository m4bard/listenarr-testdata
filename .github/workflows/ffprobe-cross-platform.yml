name: ffprobe source validation

# A cross-platform QA harness for Listenarr's ffprobe dependency — useful no matter which source is
# shipped. On every platform Listenarr targets, it validates that a given ffprobe produces the exact
# metadata FfprobeMetadataMapper reads (tools/ffprobe_equivalence.py --golden, against a golden
# captured from the current source). Each job checks BOTH:
#   * the CURRENT source (johnvansickle on Linux, evermeet on macOS, gyan on Windows) — informational,
#     so it surfaces where the status quo falls short (notably: the macOS source ships no ffprobe), and
#   * jellyfin-ffmpeg — the gate. Green jellyfin across the matrix = a behaviour-safe, consistent
#     replacement on Linux x64/arm64, macOS (osx-x64), and Windows x64.
# macOS note: Listenarr ships osx-x64 only, so that is the binary that matters. GitHub's Intel macOS
# runners are scarce (the job never allocated one), so the osx-x64 build is validated under Rosetta on
# the Apple-Silicon runner — which is exactly how Listenarr runs on Apple-Silicon Macs, and the same
# binary runs natively on Intel. See the mac64-rosetta matrix entry for the documented gap.
# The per-platform current-vs-jellyfin outcomes land in the run summary. On-demand (network-bound).
on:
  workflow_dispatch:

defaults:
  run:
    shell: bash   # git-bash exists on the Windows runner, so every step is uniform

env:
  JF_BASE: https://github.com/jellyfin/jellyfin-ffmpeg/releases/download/v7.1.4-3/jellyfin-ffmpeg_7.1.4-3_

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux64
            current_name: johnvansickle
            current_url: https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
            jf: portable_linux64-gpl.tar.xz
            binext: ""
          - os: ubuntu-24.04-arm
            target: linuxarm64
            current_name: johnvansickle
            current_url: https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz
            jf: portable_linuxarm64-gpl.tar.xz
            binext: ""
          # osx-x64 is the ONLY macOS RID Listenarr ships. GitHub's Intel macOS runners (macos-13)
          # are scarce and this job repeatedly failed to be allocated one, so we validate the osx-x64
          # (mac64) build under Rosetta on the Apple-Silicon runner instead. This is not a bench
          # trick: it is exactly how Listenarr runs on Apple-Silicon Macs (the osx-x64 binary under
          # Rosetta), and the identical binary runs natively on Intel Macs — so this cell directly
          # covers the Apple-Silicon path and is a close proxy for Intel. Documented gap, revisit if
          # (a) Listenarr drops osx-x64, (b) GitHub provides Intel macOS runners again, or (c) Rosetta
          # is ever shown to alter ffprobe's output. See run summary + README.
          - os: macos-latest
            target: mac64-rosetta
            rosetta: true
            current_name: evermeet
            current_url: https://evermeet.cx/ffmpeg/ffmpeg-6.0.zip
            jf: portable_mac64-gpl.tar.xz
            binext: ""
          - os: macos-latest
            target: macarm64
            # osx-arm64 is NOT a RID Listenarr ships (its csproj has no osx-arm64), so this cell is
            # informational: an upstream divergence in a non-shipped artifact must not fail the whole
            # workflow. jf_soft makes the jellyfin gate continue-on-error for this cell only. The hard
            # macOS gate is mac64-rosetta above (the osx-x64 build Listenarr actually ships).
            jf_soft: true
            current_name: evermeet
            current_url: https://evermeet.cx/ffmpeg/ffmpeg-6.0.zip
            jf: portable_macarm64-gpl.tar.xz
            binext: ""
          - os: windows-latest
            target: win64
            current_name: gyan
            current_url: https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
            jf: portable_win64-clang-gpl.zip
            binext: ".exe"
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Apple-Silicon runner validating the osx-x64 build: make sure Rosetta 2 is present so the
      # x86_64 ffprobe executes. GitHub's arm64 macOS images ship it, so this is usually a no-op.
      - name: Ensure Rosetta 2 (osx-x64 under Rosetta)
        if: matrix.rosetta
        run: softwareupdate --install-rosetta --agree-to-license || true

      # The install above is best-effort (|| true). Fail loudly HERE if Rosetta is genuinely absent,
      # so a missing-Rosetta run is diagnosed clearly instead of surfacing later as an opaque
      # "bad CPU type in executable" when the x86_64 jellyfin ffprobe is executed in the gate below.
      - name: Verify Rosetta 2 is present (osx-x64 under Rosetta)
        if: matrix.rosetta
        run: arch -x86_64 /usr/bin/true

      # The CURRENT source: informational (continue-on-error). A broken source — e.g. macOS shipping
      # no ffprobe — is a finding to report, not a reason to fail the harness.
      - name: Validate CURRENT source (${{ matrix.current_name }})
        id: current
        continue-on-error: true
        run: |
          python tools/fetch_ffprobe.py --url "${{ matrix.current_url }}" \
            --out "${RUNNER_TEMP}/current${{ matrix.binext }}"
          python tools/ffprobe_equivalence.py \
            --candidate "${RUNNER_TEMP}/current${{ matrix.binext }}" \
            --corpus tests/fixtures/eqcorpus --golden tests/fixtures/eq-golden.json

      # jellyfin-ffmpeg: the gate. This is the replacement we're validating. For the macarm64 cell
      # (a RID Listenarr does not ship) jf_soft makes this informational via continue-on-error, so a
      # divergence there can't fail the workflow; every shipped RID keeps this as a hard gate.
      - name: Validate jellyfin-ffmpeg
        id: jellyfin
        continue-on-error: ${{ matrix.jf_soft || false }}
        run: |
          python tools/fetch_ffprobe.py --url "${JF_BASE}${{ matrix.jf }}" \
            --out "${RUNNER_TEMP}/jellyfin${{ matrix.binext }}"
          python tools/ffprobe_equivalence.py \
            --candidate "${RUNNER_TEMP}/jellyfin${{ matrix.binext }}" \
            --corpus tests/fixtures/eqcorpus --golden tests/fixtures/eq-golden.json

      - name: Record per-platform outcome
        if: always()
        run: |
          # Emit a header + separator so GitHub renders a table, not literal pipe-text. This is
          # per-job by nature of GITHUB_STEP_SUMMARY (each job has its own), which is fine.
          {
            echo "| target | current | jellyfin |"
            echo "|---|---|---|"
            echo "| ${{ matrix.target }} | ${{ matrix.current_name }}: ${{ steps.current.outcome }} | jellyfin: ${{ steps.jellyfin.outcome }} |"
          } >> "${GITHUB_STEP_SUMMARY}"
